<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Face Detection Tool - DetectYou</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body class="bg-gray-100 text-gray-800">
  <div class="max-w-4xl mx-auto px-4 py-12">
    <article class="bg-white rounded-lg shadow-lg p-8">
      <header class="mb-8">
        <span class="inline-block bg-blue-100 text-blue-800 text-sm px-3 py-1 rounded-full mb-4">Tool</span>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Face Detection Tool</h1>
        <p class="text-gray-600">Upload an image to detect faces using browser-based simulation.</p>
      </header>

      <div class="mb-6">
        <label class="block mb-2 text-sm font-medium text-gray-700">Select Image:</label>
        <input type="file" id="face-upload" accept="image/*" class="w-full border border-gray-300 rounded-lg p-2" />
      </div>

      <button onclick="runFaceDetection()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 font-semibold">
        <i class="fas fa-search mr-2"></i>Detect Faces
      </button>

      <div id="face-result" class="mt-8 hidden">
        <h2 class="text-xl font-bold mb-4">Detection Results</h2>
        <p class="text-gray-700">(This is a simulated result. No actual face recognition is performed.)</p>
        <div class="mt-4 p-4 bg-green-100 border border-green-300 rounded-lg text-green-800">
          <i class="fas fa-check-circle mr-2"></i>Faces detected successfully. (Simulated output)
        </div>
      </div>

      <div class="mt-8 pt-8 border-t border-gray-200">
        <a href="index.html" class="text-blue-600 hover:text-blue-800 font-medium">
          <i class="fas fa-arrow-left mr-2"></i>Back to Home
        </a>
      </div>
    </article>
  </div>

  <script>
    function runFaceDetection() {
      const input = document.getElementById('face-upload');
      if (!input.files || input.files.length === 0) {
        alert('Please select an image first.');
        return;
      }

      const resultDiv = document.getElementById('face-result');
      resultDiv.classList.remove('hidden');
      resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  </script>
</body>
</html>
